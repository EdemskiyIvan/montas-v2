<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Статья — MONTAS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e0f0c;--paper:#fafafa;--paper-soft:#f1f0ec;
  --line:rgba(14,15,12,.12);--accent:#1a5cff;--accent-hover:#1448d6;
  --muted:rgba(14,15,12,.55);--muted2:rgba(14,15,12,.38);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Google Sans','Plus Jakarta Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.7}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* NAV */
.nav{position:fixed;left:0;right:0;top:0;z-index:100;width:100%;background:var(--paper);border-bottom:1px solid var(--line)}
.nav-inner{width:100%;max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,4vw,64px);height:64px;gap:24px}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;letter-spacing:-.01em}
.nav-sq{width:8px;height:8px;background:var(--accent);flex-shrink:0}
.nav-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);transition:color .15s}
.nav-back:hover{color:var(--ink)}
.nav-back svg{width:14px;height:14px}
.nav-cta{display:inline-flex;align-items:center;background:var(--accent);color:#fff;font-size:13px;font-weight:500;padding:8px 18px;border-radius:6px;transition:background .15s;white-space:nowrap}
.nav-cta:hover{background:var(--accent-hover)}

/* LAYOUT */
.article-wrap{padding-top:64px}

/* DRAFT BANNER */
.draft-banner{background:#fffbeb;border-bottom:1px solid #fde68a;padding:10px clamp(20px,4vw,64px);display:flex;align-items:center;gap:10px;font-size:13px;color:#92400e}
.draft-banner a{color:#d97706;font-weight:500;text-decoration:underline;margin-left:auto}

/* HERO */
.article-hero{padding:clamp(40px,5vw,64px) clamp(20px,4vw,64px) 0;max-width:1280px;margin:0 auto}
.article-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted2);margin-bottom:24px;flex-wrap:wrap}
.article-breadcrumb a{transition:color .15s}
.article-breadcrumb a:hover{color:var(--accent)}
.article-breadcrumb svg{width:12px;height:12px;flex-shrink:0}
.article-tag{display:inline-block;font-family:ui-monospace,monospace;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.article-h1{font-size:clamp(28px,4.5vw,54px);font-weight:700;letter-spacing:-.025em;line-height:1.1;color:var(--ink);max-width:820px;margin-bottom:20px}
.article-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:clamp(32px,4vw,48px)}
.article-author{display:flex;align-items:center;gap:10px}
.article-author-photo{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--paper-soft);border:1px solid var(--line);flex-shrink:0}
.article-author-photo img{width:100%;height:100%;object-fit:cover}
.article-author-name{font-size:13px;font-weight:500;color:var(--ink)}
.article-author-role{font-size:11px;color:var(--muted)}
.article-meta-sep{width:1px;height:28px;background:var(--line)}
.article-meta-dot{font-size:12px;color:var(--muted2);margin:0 -4px}
.article-date{font-size:12px;color:var(--muted2)}
.article-read{font-size:12px;color:var(--muted2)}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:transparent;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.share-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.share-btn.copied{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.share-btn svg{width:13px;height:13px;flex-shrink:0}

/* COVER */
.article-cover{width:100%;max-width:1280px;margin:0 auto;padding:0 clamp(20px,4vw,64px) clamp(32px,4vw,56px)}
.article-cover-inner{width:100%;aspect-ratio:16/7;border-radius:14px;overflow:hidden;background:var(--paper-soft);border:1px solid var(--line);position:relative}
.article-cover-inner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.article-cover-inner.no-cover{display:none}

/* CONTENT GRID */
.article-content-wrap{display:grid;grid-template-columns:1fr minmax(0,680px) 1fr;padding:0 clamp(20px,4vw,64px);max-width:1280px;margin:0 auto}
.article-aside-left{padding-top:4px}
.article-content{grid-column:2;font-family:'Google Sans','Plus Jakarta Sans',system-ui,sans-serif}
.article-content *{font-family:inherit !important}
.article-content [style]{background-color:transparent !important;background:transparent !important}

.article-content h2{font-size:clamp(20px,2.2vw,26px);font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-top:clamp(36px,4vw,52px);margin-bottom:14px;line-height:1.25}
.article-content h3{font-size:clamp(16px,1.6vw,20px);font-weight:600;letter-spacing:-.015em;color:var(--ink);margin-top:clamp(24px,3vw,36px);margin-bottom:10px}
.article-content p,.article-content>div{font-size:clamp(15px,1.2vw,17px);line-height:1.75;color:rgba(14,15,12,.78);margin-bottom:18px}
.article-content p:last-child,.article-content>div:last-child{margin-bottom:0}
.article-content ul,.article-content ol{padding-left:22px;margin-bottom:18px}
.article-content li{font-size:clamp(15px,1.2vw,17px);line-height:1.75;color:rgba(14,15,12,.78);margin-bottom:6px}
.article-content strong{font-weight:600;color:var(--ink)}
.article-content a{color:var(--accent);border-bottom:1px solid rgba(26,92,255,.25);transition:border-color .15s}
.article-content a:hover{border-color:var(--accent)}
.article-content blockquote,.article-content .article-callout{background:rgba(26,92,255,.07);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:16px 20px;margin:28px 0;font-style:normal}
.article-content blockquote p,.article-content .article-callout p{margin-bottom:0;color:var(--ink) !important;font-size:clamp(14px,1.1vw,16px) !important;font-style:italic}
.article-content hr{border:none;border-top:1px solid var(--line);margin:clamp(32px,4vw,48px) 0}

/* TOC */
.toc{position:sticky;top:88px;padding-left:clamp(24px,3vw,40px);align-self:start}
.toc-label{font-family:ui-monospace,monospace;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:12px}
.toc-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.toc-list a{font-size:12px;color:var(--muted);transition:color .15s;line-height:1.4;display:block}
.toc-list a:hover,.toc-list a.active{color:var(--accent)}
.toc-list .toc-h3{padding-left:12px}

/* RELATED */
.article-related{background:var(--paper-soft);padding:clamp(48px,6vw,80px) clamp(20px,4vw,64px);margin-top:clamp(48px,6vw,72px)}
.article-related-inner{max-width:1280px;margin:0 auto}
.article-related h2{font-size:clamp(20px,2.5vw,28px);font-weight:600;letter-spacing:-.02em;margin-bottom:clamp(24px,3vw,36px)}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.related-card{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--paper);transition:border-color .2s;display:flex;flex-direction:column}
.related-card:hover{border-color:rgba(26,92,255,.4)}
.related-card-img{aspect-ratio:16/9;background:var(--paper-soft);overflow:hidden;position:relative}
.related-card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.16,1,.3,1)}
.related-card:hover .related-card-img img{transform:scale(1.04)}
.related-card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted2)}
.related-card-body{padding:16px 18px;flex:1;display:flex;flex-direction:column}
.related-card-tag{font-family:ui-monospace,monospace;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.related-card-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;flex:1}
.related-card-date{font-size:11px;color:var(--muted2);margin-top:12px}

/* EDIT LINK */
.edit-bar{max-width:1280px;margin:0 auto;padding:0 clamp(20px,4vw,64px);display:flex;justify-content:flex-end;padding-bottom:16px}
.edit-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);transition:color .15s}
.edit-link:hover{color:var(--accent)}

/* FOOTER */
.footer-simple{background:var(--ink);padding:clamp(24px,3vw,36px) clamp(20px,4vw,64px)}
.footer-simple-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-simple-logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#fafafa}
.footer-simple-copy{font-size:11px;color:rgba(255,255,255,.35)}

/* ERROR */
.err-wrap{max-width:440px;margin:80px auto;text-align:center;padding:0 24px}
.err-wrap h2{font-size:22px;font-weight:600;margin-bottom:10px}
.err-wrap p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}

@media(max-width:900px){
  .article-content-wrap{grid-template-columns:1fr;padding:0 clamp(20px,4vw,40px)}
  .article-content{grid-column:1}
  .toc{display:none}
  .related-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:560px){
  .related-grid{grid-template-columns:1fr}
  .nav-cta{display:none}
}
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><div class="nav-sq"></div>MONTAS</a>
    <a href="/#blog" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Все статьи
    </a>
    <a href="/#contact" class="nav-cta">Обсудить проект</a>
  </div>
</header>

<div id="page-root">
  <div class="err-wrap"><p style="color:var(--muted)">Загрузка…</p></div>
</div>

<script>
const DB_KEY = 'montas_articles';

const TEAM = {
  'Илья Берман':         {role:'Генеральный директор',    photo:'../assets/team-1.png'},
  'Иван Едемский':       {role:'Технический директор',    photo:'../assets/team-2.png'},
  'Феликс Ишмухаметов': {role:'Операционный директор',   photo:'../assets/team-3.png'},
  'Анастасия Королева':  {role:'Креативный директор',     photo:'../assets/team-4.png'},
  'Игорь Пропастенко':   {role:'Директор по маркетингу',  photo:'../assets/team-5.jpg'},
  'Тася Шеломова':       {role:'Руководитель отдела дизайна', photo:'../assets/team-6.png'},
};

function getArticles(){
  try{const r=localStorage.getItem(DB_KEY);return r?JSON.parse(r):[];}catch{return [];}
}

function fmtDate(d){
  if(!d)return '';
  try{
    const dt=new Date(d+'T00:00:00');
    const m=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    return dt.getDate()+' '+m[dt.getMonth()]+' '+dt.getFullYear();
  }catch{return d}
}

function readingTime(html){
  const text=(html||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
  const words=text.split(' ').filter(Boolean).length;
  return Math.max(1,Math.round(words/200))+' мин читать';
}

// Clean contenteditable artifacts and strip inline styles/fonts injected by browser
function cleanHtml(html){
  const el=document.createElement('div');
  el.innerHTML=html||'';
  // remove empty divs
  el.querySelectorAll('div').forEach(div=>{
    const kids=[...div.childNodes];
    if(kids.length===0||(kids.length===1&&kids[0].nodeName==='BR')){div.remove();return;}
    if(!div.className&&!div.id){
      const p=document.createElement('p');
      p.innerHTML=div.innerHTML;
      div.replaceWith(p);
    }
  });
  // strip inline style, font, bgcolor attributes from every element
  el.querySelectorAll('[style],[face],[color],[bgcolor],[size]').forEach(node=>{
    node.removeAttribute('style');
    node.removeAttribute('face');
    node.removeAttribute('color');
    node.removeAttribute('bgcolor');
    node.removeAttribute('size');
  });
  // unwrap <font> tags
  el.querySelectorAll('font').forEach(font=>{
    const frag=document.createDocumentFragment();
    while(font.firstChild) frag.appendChild(font.firstChild);
    font.replaceWith(frag);
  });
  return el.innerHTML;
}

// Inject IDs into headings and build TOC data
function processHeadings(contentEl){
  const items=[];
  contentEl.querySelectorAll('h2,h3').forEach((h,i)=>{
    if(!h.id) h.id='h-'+i;
    items.push({tag:h.tagName,id:h.id,text:h.textContent.trim()});
  });
  return items;
}

function buildTocHtml(items){
  if(!items.length) return '';
  const links=items.map(item=>{
    const cls=item.tag==='H3'?' class="toc-h3"':'';
    return `<li${cls}><a href="#${item.id}">${item.text}</a></li>`;
  }).join('');
  return `<nav class="toc" aria-label="Содержание">
    <div class="toc-label">Содержание</div>
    <ul class="toc-list">${links}</ul>
  </nav>`;
}

function buildRelated(articles, currentId){
  const others=articles.filter(a=>a.id!==currentId&&a.status==='published').slice(0,3);
  if(!others.length) return '';
  const cards=others.map(a=>{
    const imgHtml=a.cover
      ?`<img src="${a.cover}" alt="${a.title||''}">`
      :`<div class="related-card-img-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:28px;height:28px"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>`;
    return `<a href="viewer.html?id=${a.id}" class="related-card">
      <div class="related-card-img">${imgHtml}</div>
      <div class="related-card-body">
        <div class="related-card-tag">${a.category||'Блог'}</div>
        <div class="related-card-title">${a.title||'Без названия'}</div>
        <div class="related-card-date">${fmtDate(a.date)}</div>
      </div>
    </a>`;
  }).join('');
  return `<div class="article-related">
    <div class="article-related-inner">
      <h2>Читайте также</h2>
      <div class="related-grid">${cards}</div>
    </div>
  </div>`;
}

function render(){
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  const slug=params.get('slug');
  const articles=getArticles();
  const art=id?articles.find(a=>a.id===id):articles.find(a=>a.slug===slug);
  const root=document.getElementById('page-root');

  if(!art){
    root.innerHTML=`<div class="err-wrap">
      <h2>Статья не найдена</h2>
      <p>Возможно, статья была удалена или ещё не опубликована.</p>
      <a href="/#blog" style="display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:6px">Все статьи</a>
    </div>`;
    return;
  }

  document.title=(art.title||'Статья')+' — MONTAS';

  const isDraft=art.status==='draft';
  const member=TEAM[art.author]||null;
  const coverHtml=art.cover
    ?`<div class="article-cover"><div class="article-cover-inner"><img src="${art.cover}" alt="${art.title||''}"></div></div>`
    :'';
  const authorHtml=member
    ?`<div class="article-author">
        <div class="article-author-photo"><img src="${member.photo}" alt="${art.author}" onerror="this.parentElement.style.display='none'"></div>
        <div><div class="article-author-name">${art.author}</div><div class="article-author-role">${member.role}</div></div>
      </div>`
    :`<div class="article-author-name">${art.author||'MONTAS'}</div>`;

  // Build content
  const cleanContent=cleanHtml(art.content||'<p>Содержимое статьи не добавлено.</p>');

  root.innerHTML=`
    ${isDraft?`<div class="draft-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Это черновик — статья не опубликована на сайте
      <a href="/admin/">Редактировать</a>
    </div>`:''}
    <div class="article-wrap">
      <div class="article-hero">
        <div class="article-breadcrumb">
          <a href="/">Главная</a>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
          <a href="/#blog">Блог</a>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
          <span>${art.category||'Статья'}</span>
        </div>
        <div class="article-tag">${art.category||''}</div>
        <h1 class="article-h1">${art.title||''}</h1>
        <div class="article-meta">
          ${authorHtml}
          <div class="article-meta-sep"></div>
          <span class="article-read">${readingTime(art.content)}</span>
          <span class="article-meta-dot">·</span>
          <span class="article-date">${fmtDate(art.date)}</span>
          <button class="share-btn" id="share-btn" onclick="copyLink(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 12 2 16 6"/><line x1="12" y1="2" x2="12" y2="15"/><path d="M4 14v6a1 1 0 001 1h14a1 1 0 001-1v-6"/></svg>
            <span id="share-label">Поделиться</span>
          </button>
        </div>
      </div>

      ${coverHtml}

      <div class="article-content-wrap">
        <div class="article-aside-left" id="toc-aside"></div>
        <div class="article-content" id="article-body">${cleanContent}</div>
        <div></div>
      </div>

${buildRelated(articles, art.id)}

      <footer class="footer-simple">
        <div class="footer-simple-inner">
          <div class="footer-simple-logo"><div style="width:8px;height:8px;background:#1a5cff;flex-shrink:0"></div>MONTAS</div>
          <span class="footer-simple-copy">© 2026 Montas. Все права защищены.</span>
        </div>
      </footer>
    </div>`;

  // Build TOC from real DOM headings
  const bodyEl=document.getElementById('article-body');
  const tocItems=processHeadings(bodyEl);
  if(tocItems.length){
    document.getElementById('toc-aside').innerHTML=buildTocHtml(tocItems);
    // Active TOC on scroll
    const headingEls=bodyEl.querySelectorAll('h2[id],h3[id]');
    const tocLinks=document.querySelectorAll('.toc-list a');
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          tocLinks.forEach(l=>l.classList.remove('active'));
          const a=document.querySelector(`.toc-list a[href="#${e.target.id}"]`);
          if(a) a.classList.add('active');
        }
      });
    },{rootMargin:'-20% 0px -70% 0px'});
    headingEls.forEach(h=>obs.observe(h));
  }
}

render();

function copyLink(btn){
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const lbl=document.getElementById('share-label');
    btn.classList.add('copied');
    lbl.textContent='Ссылка скопирована';
    setTimeout(()=>{btn.classList.remove('copied');lbl.textContent='Поделиться';},2200);
  });
}
</script>
</body>
</html>
