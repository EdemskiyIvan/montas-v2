<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Блог — MONTAS</title>
<meta name="description" content="Статьи о маркетинге, дизайне, разработке и росте бизнеса от команды MONTAS">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e0f0c;--paper:#fafafa;--paper-soft:#f1f0ec;
  --line:rgba(14,15,12,.12);--line-soft:rgba(14,15,12,.06);
  --accent:#1a5cff;--accent-soft:rgba(26,92,255,.08);--accent-hover:#1448d6;
  --muted:rgba(14,15,12,.55);--muted2:rgba(14,15,12,.40);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'Google Sans','Plus Jakarta Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer}
img{display:block;max-width:100%}

/* NAV */
.nav{position:fixed;left:0;right:0;top:0;z-index:100;background:var(--paper);border-bottom:1px solid var(--line);transition:box-shadow .2s}
.nav.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.06)}
.nav-inner{width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,4vw,64px);height:72px;gap:32px}
.nav-logo{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.nav-sq{width:9px;height:9px;background:var(--accent);flex-shrink:0}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-links a{font-family:'SF Mono',ui-monospace,monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);transition:color .15s}
.nav-links a:hover,.nav-links a.active{color:var(--ink)}
.nav-cta{display:inline-flex;align-items:center;background:var(--accent);color:#fff;font-size:13px;font-weight:500;padding:9px 20px;border-radius:6px;transition:background .15s}
.nav-cta:hover{background:var(--accent-hover)}
.burger{display:none;flex-direction:column;gap:5px;width:40px;height:40px;padding:10px 8px;border-radius:6px;transition:background .15s}
.burger span{display:block;width:100%;height:1.5px;background:var(--ink);transition:transform .25s,opacity .25s}
.burger:hover{background:rgba(14,15,12,.06)}
.burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.mob-menu{display:none;position:fixed;inset:0;z-index:99;background:var(--paper);padding:90px clamp(20px,3vw,40px) 40px;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1)}
.mob-menu.open{transform:translateX(0)}
.mob-menu a{font-size:22px;font-weight:600;letter-spacing:-.02em;padding:14px 0;border-bottom:1px solid var(--line);color:var(--ink);transition:color .15s}
.mob-menu a:hover{color:var(--accent)}
.mob-menu .mob-btn{margin-top:20px;display:flex;justify-content:center;background:var(--accent);color:#fff;font-size:15px;font-weight:500;padding:16px 28px;border-radius:6px}

/* PAGE */
.page-wrap{padding-top:72px;min-height:100vh}

/* HERO */
.blog-hero{
  background:var(--paper);
  padding:clamp(48px,6vw,80px) clamp(20px,4vw,64px) 0;
}
.blog-hero-inner{max-width:1280px;margin:0 auto;}
.blog-hero-label{
  display:inline-flex;align-items:center;gap:6px;
  border:1px solid var(--line);border-radius:999px;
  background:var(--paper-soft);padding:5px 14px 5px 10px;
  font-family:'SF Mono',ui-monospace,monospace;
  font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:22px;width:fit-content;
}
.blog-hero-label svg{color:var(--accent)}
.blog-hero h1{
  font-size:clamp(30px,4.5vw,56px);font-weight:700;
  letter-spacing:-.03em;line-height:1.06;margin-bottom:16px;
}
.blog-hero h1 em{font-style:normal;color:var(--accent)}
.blog-hero-sub{font-size:clamp(14px,1.2vw,16px);color:var(--muted);line-height:1.7;max-width:480px}
@media(max-width:860px){.blog-hero-inner{grid-template-columns:1fr}}

.blog-hero-filter{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-top:14px;padding-bottom:clamp(16px,2vw,20px)}
.blog-hero-socials{display:flex;align-items:center;gap:8px}
.blog-social-link{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--line);color:var(--muted);transition:border-color .15s,color .15s,background .15s}
.blog-social-link:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.blog-hero-filter-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-left:auto}
.filter-tabs{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
@media(max-width:700px){.blog-hero-filter{flex-direction:column;align-items:flex-start}.blog-hero-filter-right{margin-left:0;width:100%}.search-wrap{width:100%}.search-inp{width:100%}}
.filter-tab{
  font-family:'SF Mono',ui-monospace,monospace;
  font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  padding:7px 16px;border-radius:999px;border:1px solid var(--line);
  color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s,background .15s;
  background:transparent;
}
.filter-tab:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.filter-tab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.search-wrap{position:relative;flex-shrink:0}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted2);pointer-events:none}
.search-inp{
  font-family:'Google Sans','Plus Jakarta Sans',system-ui,sans-serif;
  font-size:13px;color:var(--ink);
  background:var(--paper-soft);border:1px solid var(--line);border-radius:8px;
  padding:8px 12px 8px 34px;width:220px;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.search-inp::placeholder{color:var(--muted2)}
.search-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,92,255,.1)}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;border-radius:50%;background:var(--muted2);
  display:none;align-items:center;justify-content:center;cursor:pointer;
  color:#fff;font-size:10px;line-height:1;border:none;padding:0;
}
.search-clear.visible{display:flex}
@media(max-width:600px){.search-inp{width:100%}.blog-filter-inner{flex-direction:column;align-items:stretch}.search-wrap{width:100%}}

/* GRID */
.blog-main{padding:clamp(16px,2vw,24px) clamp(20px,4vw,64px) clamp(60px,8vw,100px)}
.blog-main-inner{max-width:1280px;margin:0 auto}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(16px,2vw,24px)}
.blog-card{
  display:flex;flex-direction:column;border:1px solid var(--line);border-radius:12px;overflow:hidden;
  background:var(--paper);transition:border-color .2s,box-shadow .2s;
  cursor:pointer;
}
.blog-card:hover{border-color:rgba(26,92,255,.35);box-shadow:0 4px 24px rgba(26,92,255,.08)}
.blog-card-img{aspect-ratio:16/9;background:var(--paper-soft);overflow:hidden;position:relative;flex-shrink:0}
.blog-card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.16,1,.3,1)}
.blog-card:hover .blog-card-img img{transform:scale(1.04)}
.blog-card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--paper-soft);color:var(--muted2)}
.blog-card-body{padding:clamp(16px,2vw,22px);display:flex;flex-direction:column;flex:1}
.blog-card-tag{display:inline-block;font-family:ui-monospace,monospace;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.blog-card-title{font-size:clamp(14px,1.3vw,16px);font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:8px}
.blog-card-desc{font-size:13px;line-height:1.6;color:var(--muted);flex:1}
.blog-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.blog-card-date{font-size:11px;color:var(--muted2)}
.blog-card-link{font-size:12px;font-weight:500;color:var(--accent);display:flex;align-items:center;gap:4px;transition:gap .15s}
.blog-card:hover .blog-card-link{gap:7px}
.blog-card-link svg{width:12px;height:12px}

/* TOOLBAR */
.blog-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:clamp(20px,2.5vw,32px)}
.blog-count{font-size:13px;color:var(--muted)}
.blog-count strong{color:var(--ink);font-weight:600}
@media(max-width:700px){.blog-toolbar{flex-direction:column;align-items:flex-start}.search-wrap{width:100%}.search-inp{width:100%}}

/* EMPTY */
.blog-empty{
  grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(60px,8vw,100px) 24px;text-align:center;
}
.blog-empty-icon{width:56px;height:56px;border-radius:12px;background:var(--paper-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:var(--muted2)}
.blog-empty h3{font-size:18px;font-weight:600;margin-bottom:8px}
.blog-empty p{font-size:14px;color:var(--muted);max-width:340px}

/* FOOTER */
.footer-inner{max-width:1280px;margin:0 auto;padding:clamp(40px,5vw,64px) clamp(20px,3vw,40px) clamp(20px,3vw,32px)}
.footer-grid{display:grid;grid-template-columns:1.2fr 1fr auto;gap:clamp(24px,4vw,48px);margin-bottom:clamp(32px,4vw,48px);align-items:start}
.footer-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--ink);margin-bottom:14px}
.footer-desc{font-size:13px;line-height:1.6;color:var(--muted);max-width:280px}
.footer-contacts{display:flex;flex-direction:column;gap:10px}
.footer-contact{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);transition:color .15s}
.footer-contact:hover{color:var(--ink)}
.footer-contact svg{width:13px;height:13px;color:var(--accent);flex-shrink:0}
.footer-socials{display:flex;flex-direction:column;gap:10px}
.footer-social{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);transition:color .15s}
.footer-social:hover{color:var(--ink)}
.footer-social svg{width:13px;height:13px;color:var(--accent)}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:20px;border-top:1px solid var(--line);gap:16px;flex-wrap:wrap}
.footer-copy{font-size:11px;color:var(--muted2)}
.footer-priv{font-size:11px;color:var(--muted2);transition:color .15s}
.footer-priv:hover{color:var(--ink)}

@media(max-width:1000px){.blog-grid{grid-template-columns:1fr 1fr}}
@media(max-width:760px){
  .nav-links,.nav-cta{display:none}
  .burger{display:flex}
  .mob-menu{display:flex}
  .footer-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:580px){.blog-grid{grid-template-columns:1fr}}
@media(max-width:500px){.footer-grid{grid-template-columns:1fr}}
.nav-logo-img{height:26px;width:auto;display:block}.footer-logo-img{height:22px;width:auto;display:block}
</style>
</head>
<body>

<header class="nav" id="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><img src="/assets/logo.svg" alt="MONTAS" class="nav-logo-img"></a>
    <nav class="nav-links">
      <a href="/#services">Услуги</a>
      <a href="/#cases">Кейсы</a>
      <a href="/#about">О нас</a>
      <a href="/blog/" class="active">Блог</a>
      <a href="/#contact">Контакты</a>
    </nav>
    <a href="/#contact" class="nav-cta">Оставить заявку</a>
    <button class="burger" id="burger" aria-label="Меню"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="mob-menu" id="mob-menu">
  <a href="/#services" class="m-link">Услуги</a>
  <a href="/#cases" class="m-link">Кейсы</a>
  <a href="/#about" class="m-link">О нас</a>
  <a href="/blog/" class="m-link">Блог</a>
  <a href="/#contact" class="m-link">Контакты</a>
  <a href="/#contact" class="mob-btn m-link">Оставить заявку</a>
</div>

<div class="page-wrap">

  <div class="blog-hero">
    <div class="blog-hero-inner">
      <div class="blog-hero-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Блог MONTAS
      </div>
      <h1>Маркетинг, дизайн<br>и <em>рост бизнеса</em></h1>
      <p class="blog-hero-sub">Делимся опытом, разбираем кейсы и рассказываем о том, что реально работает для малого и среднего бизнеса</p>
      <div class="blog-hero-filter">
        <div class="blog-hero-socials" id="blog-socials"></div>
      </div>
    </div>
  </div>

  <div class="blog-main">
    <div class="blog-main-inner">
      <div class="blog-toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input class="search-inp" id="search-inp" type="text" placeholder="Поиск по статьям…" autocomplete="off">
          <button class="search-clear" id="search-clear" aria-label="Очистить">✕</button>
        </div>
        <div class="filter-tabs" id="filter-tabs">
          <button class="filter-tab active" data-cat="">Все статьи</button>
        </div>
        <p class="blog-count" id="blog-count" style="margin-left:auto"></p>
      </div>
      <div class="blog-grid" id="blog-grid"></div>
    </div>
  </div>

</div>



<script src="../admin/config.js"></script>
<script>
const SOCIAL_ICONS={
  telegram:`<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>`,
  vk:`<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12.785 16.241s.288-.032.436-.194c.136-.148.132-.427.132-.427s-.02-1.304.587-1.496c.6-.19 1.37 1.26 2.185 1.815.617.416 1.086.325 1.086.325l2.182-.03s1.141-.071.6-.968c-.044-.073-.314-.661-1.618-1.869-1.365-1.263-1.183-1.058.462-3.243.999-1.333 1.398-2.147 1.273-2.494-.12-.332-.855-.244-.855-.244l-2.455.015s-.182-.025-.317.056c-.132.079-.217.264-.217.264s-.386 1.028-.901 1.902c-1.085 1.843-1.52 1.94-1.698 1.825-.413-.267-.31-1.075-.31-1.649 0-1.793.272-2.54-.528-2.735-.266-.064-.461-.107-1.141-.114-.872-.009-1.609.003-2.026.207-.278.136-.492.439-.361.456.161.022.526.098.72.362.25.341.241 1.107.241 1.107s.144 2.11-.335 2.372c-.329.179-.78-.186-1.748-1.854-.496-.858-.871-1.806-.871-1.806s-.072-.179-.202-.275c-.157-.116-.376-.153-.376-.153l-2.33.015s-.35.01-.479.163c-.113.136-.009.417-.009.417s1.826 4.271 3.892 6.423c1.895 1.973 4.047 1.843 4.047 1.843h.975z"/></svg>`,
  instagram:`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".7" fill="currentColor" stroke="none"/></svg>`,
  youtube:`<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>`,
};

function renderSocials(){
  const cfg=window.MONTAS_CONFIG||{};
  const el=document.getElementById('blog-socials');
  if(!el)return;
  const links=[];
  if(cfg.telegram?.enabled&&cfg.telegram?.channel){
    const h=cfg.telegram.channel.replace('@','');
    links.push({href:`https://t.me/${h}`,title:'Telegram',key:'telegram'});
  }
  if(cfg.vk?.enabled&&cfg.vk?.url){links.push({href:cfg.vk.url,title:'ВКонтакте',key:'vk'});}
  if(cfg.instagram?.enabled&&cfg.instagram?.url){links.push({href:cfg.instagram.url,title:'Instagram',key:'instagram'});}
  if(cfg.youtube?.enabled&&cfg.youtube?.url){links.push({href:cfg.youtube.url,title:'YouTube',key:'youtube'});}
  el.innerHTML=links.map(l=>`<a class="blog-social-link" href="${l.href}" target="_blank" rel="noopener" title="${l.title}">${SOCIAL_ICONS[l.key]||''}</a>`).join('');
  el.style.display=links.length?'flex':'none';
  document.querySelector('.blog-hero-filter').style.display=links.length?'':'none';
}

async function getArticles(){
  try{return await fetch('/api/posts').then(r=>r.json());}catch{return [];}
}

function fmtDate(d){
  if(!d)return '';
  try{
    const dt=new Date(d+'T00:00:00');
    const m=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    return dt.getDate()+' '+m[dt.getMonth()]+' '+dt.getFullYear();
  }catch{return d;}
}

function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function cardHtml(art){
  const url='/blog/'+encodeURIComponent(art.slug);
  const img=art.cover&&art.cover.length>4
    ?`<img src="${art.cover}" alt="${esc(art.title)}" loading="lazy">`
    :`<div class="blog-card-img-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-6 6 6"/><circle cx="8" cy="14" r="1.5"/></svg></div>`;
  return `<a href="${url}" class="blog-card">
    <div class="blog-card-img">${img}</div>
    <div class="blog-card-body">
      <span class="blog-card-tag">${esc(art.category||'Статья')}</span>
      <div class="blog-card-title">${esc(art.title)}</div>
      <div class="blog-card-desc">${esc(art.excerpt||'')}</div>
      <div class="blog-card-foot">
        <span class="blog-card-date">${fmtDate(art.date)}</span>
        <span class="blog-card-link">Читать <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
      </div>
    </div>
  </a>`;
}

function emptyHtml(){
  return `<div class="blog-empty">
    <div class="blog-empty-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </div>
    <h3>Статей пока нет</h3>
    <p>Опубликованные статьи появятся здесь автоматически</p>
  </div>`;
}

let allArticles=[];
let activeCat='';
let searchQuery='';

function countLabel(n){return n===1?'статья':n>=2&&n<=4?'статьи':'статей';}

function render(){
  const grid=document.getElementById('blog-grid');
  const countEl=document.getElementById('blog-count');
  const q=searchQuery.toLowerCase().trim();
  const filtered=allArticles.filter(a=>{
    if(activeCat&&a.category!==activeCat)return false;
    if(q){
      const hay=(a.title+' '+(a.excerpt||'')+' '+(a.category||'')).toLowerCase();
      return hay.includes(q);
    }
    return true;
  });
  if(!filtered.length){
    const msg=q?`Ничего не найдено по запросу «${esc(q)}»`:'Статей пока нет';
    const sub=q?'Попробуйте другое слово или сбросьте фильтр':'Опубликованные статьи появятся здесь автоматически';
    grid.innerHTML=`<div class="blog-empty">
      <div class="blog-empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
      <h3>${msg}</h3><p>${sub}</p></div>`;
    countEl.textContent='';
  } else {
    grid.innerHTML=filtered.map(cardHtml).join('');
    countEl.innerHTML=`<strong>${filtered.length}</strong> ${countLabel(filtered.length)}`;
  }
}

function buildFilters(articles){
  const cats=[...new Set(articles.map(a=>a.category).filter(Boolean))];
  const tabs=document.getElementById('filter-tabs');
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='filter-tab';
    btn.dataset.cat=cat;
    btn.textContent=cat;
    tabs.appendChild(btn);
  });
  tabs.addEventListener('click',e=>{
    const btn=e.target.closest('.filter-tab');
    if(!btn)return;
    tabs.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeCat=btn.dataset.cat;
    render();
  });
}

// Search
const searchInp=document.getElementById('search-inp');
const searchClear=document.getElementById('search-clear');
searchInp.addEventListener('input',()=>{
  searchQuery=searchInp.value;
  searchClear.classList.toggle('visible',searchQuery.length>0);
  render();
});
searchClear.addEventListener('click',()=>{
  searchInp.value='';searchQuery='';
  searchClear.classList.remove('visible');
  searchInp.focus();
  render();
});

// Init
(async()=>{
  allArticles=await getArticles();
  buildFilters(allArticles);
  render();
  renderSocials();
})();

// Nav scroll
const navEl=document.getElementById('nav');
window.addEventListener('scroll',()=>navEl.classList.toggle('scrolled',scrollY>20),{passive:true});

// Burger
const burger=document.getElementById('burger'),mob=document.getElementById('mob-menu');
burger.addEventListener('click',()=>{
  const o=burger.classList.toggle('open');
  mob.classList.toggle('open',o);
  document.body.style.overflow=o?'hidden':'';
});
mob.querySelectorAll('.m-link').forEach(a=>a.addEventListener('click',()=>{
  burger.classList.remove('open');mob.classList.remove('open');document.body.style.overflow='';
}));
</script>
