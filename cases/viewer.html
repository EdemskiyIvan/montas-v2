<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Кейс — MONTAS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e0f0c;--paper:#fafafa;--paper-soft:#f1f0ec;
  --line:rgba(14,15,12,.12);--accent:#1a5cff;--accent-hover:#1448d6;
  --accent-soft:rgba(26,92,255,.08);
  --muted:rgba(14,15,12,.55);--muted2:rgba(14,15,12,.38);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Google Sans','Plus Jakarta Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.7}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* NAV */
.nav{position:fixed;left:0;right:0;top:0;z-index:100;width:100%;background:var(--paper);border-bottom:1px solid var(--line)}
.nav-inner{width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,4vw,64px);height:72px;gap:32px}
.nav-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);transition:color .15s}
.nav-back:hover{color:var(--ink)}
.nav-back svg{width:14px;height:14px}
.nav-cta{display:inline-flex;align-items:center;background:var(--accent);color:#fff;font-size:13px;font-weight:500;padding:8px 18px;border-radius:6px;transition:background .15s;white-space:nowrap}
.nav-cta:hover{background:var(--accent-hover)}
.nav-logo-img{height:26px;width:auto;display:block}

.page-wrap{padding-top:72px}

/* DRAFT */
.draft-banner{background:#fffbeb;border-bottom:1px solid #fde68a;padding:10px clamp(20px,4vw,64px);font-size:13px;color:#92400e}

/* HERO */
.case-hero{padding:clamp(40px,5vw,64px) clamp(20px,4vw,64px) clamp(32px,4vw,48px);max-width:1280px;margin:0 auto}
.case-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted2);margin-bottom:24px;flex-wrap:wrap}
.case-breadcrumb a:hover{color:var(--accent)}
.case-breadcrumb svg{width:10px;height:10px;flex-shrink:0}
.case-industry{font-family:ui-monospace,monospace;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.case-h1{font-size:clamp(28px,4.5vw,56px);font-weight:700;letter-spacing:-.025em;line-height:1.1;color:var(--ink);max-width:820px;margin-bottom:10px}
.case-subtitle{font-size:clamp(15px,1.3vw,18px);color:var(--muted);line-height:1.55;max-width:640px;margin-bottom:24px}

/* RESULT LINK */
.case-result-link{display:inline-flex;align-items:center;gap:8px;margin-bottom:28px;padding:10px 20px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;transition:background .15s,transform .1s;letter-spacing:.01em}
.case-result-link:hover{background:var(--accent-hover)}
.case-result-link:active{transform:scale(.98)}
.case-result-link svg{width:12px;height:12px;flex-shrink:0;opacity:.85}

/* SERVICES TAGS */
.case-services{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:clamp(28px,3vw,40px)}
.case-srv-tag{padding:5px 14px;border-radius:999px;background:var(--paper-soft);border:1px solid var(--line);font-size:11px;font-weight:500;color:var(--muted)}

/* COVER */
.case-cover{width:100%;max-width:1280px;margin:0 auto;padding:0 clamp(20px,4vw,64px) clamp(32px,4vw,56px)}
.case-cover-inner{width:100%;aspect-ratio:16/7;border-radius:14px;overflow:hidden;background:var(--paper-soft);border:1px solid var(--line);position:relative}
.case-cover-inner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.case-cover-inner.no-cover{display:none}

/* METRICS */
.case-metrics{max-width:1280px;margin:0 auto;padding:0 clamp(20px,4vw,64px) clamp(32px,4vw,56px)}
.case-metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:var(--line);border-radius:16px;overflow:hidden;border:1px solid var(--line)}
.case-metric-card{background:var(--paper);padding:clamp(24px,3vw,36px) clamp(20px,2.5vw,32px);display:flex;flex-direction:column;gap:6px;position:relative}
.case-metric-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),rgba(26,92,255,.3));opacity:0;transition:opacity .2s}
.case-metric-card:hover::after{opacity:1}
.case-metric-val{font-size:clamp(36px,4vw,52px);font-weight:800;letter-spacing:-.04em;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
.case-metric-lbl{font-size:12px;color:var(--muted);line-height:1.4;font-weight:500;text-transform:uppercase;letter-spacing:.05em}


/* CONTENT */
.case-content-wrap{max-width:860px;margin:0 auto;padding:clamp(24px,3vw,40px) clamp(20px,4vw,64px) clamp(48px,6vw,80px)}
.case-content{font-size:clamp(15px,1.2vw,17px);line-height:1.75;color:rgba(14,15,12,.78)}
.case-content h2{font-size:clamp(20px,2.2vw,26px);font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-top:clamp(36px,4vw,52px);margin-bottom:14px;line-height:1.25}
.case-content h3{font-size:clamp(16px,1.6vw,20px);font-weight:600;color:var(--ink);margin-top:clamp(24px,3vw,36px);margin-bottom:10px}
.case-content p,.case-content>div{margin-bottom:18px}
.case-content p:last-child{margin-bottom:0}
.case-content ul,.case-content ol{padding-left:22px;margin-bottom:18px}
.case-content li{margin-bottom:6px}
.case-content strong{font-weight:600;color:var(--ink)}
.case-content a{color:var(--accent);border-bottom:1px solid rgba(26,92,255,.25)}
.case-content blockquote{background:rgba(26,92,255,.07);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:16px 20px;margin:28px 0}
.case-content blockquote p{margin-bottom:0;color:var(--ink) !important}

/* RELATED */
.case-related{background:var(--paper-soft);padding:clamp(48px,6vw,80px) clamp(20px,4vw,64px);border-top:1px solid var(--line)}
.case-related-inner{max-width:1280px;margin:0 auto}
.case-related h2{font-size:clamp(20px,2.5vw,28px);font-weight:700;letter-spacing:-.02em;margin-bottom:clamp(24px,3vw,36px)}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(16px,2vw,24px)}
.related-card{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--paper);transition:border-color .2s,box-shadow .2s;display:flex;flex-direction:column;cursor:pointer;text-decoration:none;color:inherit}
.related-card:hover{border-color:rgba(26,92,255,.35);box-shadow:0 4px 24px rgba(26,92,255,.08)}
.related-card-img{aspect-ratio:16/9;background:var(--paper-soft);overflow:hidden;position:relative;flex-shrink:0}
.related-card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.16,1,.3,1)}
.related-card:hover .related-card-img img{transform:scale(1.04)}
.related-card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted2)}
.related-card-body{padding:clamp(14px,2vw,20px);flex:1;display:flex;flex-direction:column}
.related-card-ind{font-family:ui-monospace,monospace;font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.related-card-title{font-size:clamp(14px,1.3vw,16px);font-weight:600;color:var(--ink);line-height:1.35;flex:1}
.related-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:12px}
.related-card-tag{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--paper-soft);color:var(--muted);border:1px solid var(--line)}

/* FOOTER */
.footer-simple{background:var(--ink);padding:clamp(24px,3vw,36px) clamp(20px,4vw,64px)}
.footer-simple-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-simple-logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#fafafa}
.footer-simple-copy{font-size:11px;color:rgba(255,255,255,.35)}
.footer-logo-img{height:20px;width:auto;display:block;filter:brightness(0) invert(1);opacity:.7}

/* ERROR */
.err-wrap{max-width:440px;margin:80px auto;text-align:center;padding:0 24px}
.err-wrap h2{font-size:22px;font-weight:600;margin-bottom:10px}
.err-wrap p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}
.err-wrap a{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--accent);color:#fff;border-radius:6px;font-size:13px;font-weight:500}

@media(max-width:700px){.related-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.related-grid{grid-template-columns:1fr}.case-metrics-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.nav-cta{display:none}}
.nav-logo-img{height:26px;width:auto;display:block}.footer-logo-img{height:22px;width:auto;display:block}
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><img src="/assets/logo.svg" alt="MONTAS" class="nav-logo-img"></a>
    <a href="/#cases" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Все кейсы
    </a>
    <a href="/#contact" class="nav-cta">Обсудить проект</a>
  </div>
</header>

<div id="page-root">
  <div class="page-wrap" style="display:flex;align-items:center;justify-content:center;min-height:60vh">
    <p style="color:var(--muted)">Загрузка…</p>
  </div>
</div>

<script>
async function getCases(){try{return await fetch('/api/cases').then(r=>r.json());}catch{return [];}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){
  if(!d)return '';
  try{const dt=new Date(d+'T00:00:00');const m=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];return `${dt.getDate()} ${m[dt.getMonth()]} ${dt.getFullYear()}`;}catch{return d;}
}

function relatedCardHtml(c){
  const cover=c.cover&&c.cover.length>4
    ?`<img src="${esc(c.cover)}" alt="${esc(c.title)}">`
    :`<div class="related-card-img-ph"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-6 6 6"/></svg></div>`;
  const tags=(c.services||[]).slice(0,3).map(t=>`<span class="related-card-tag">${esc(t)}</span>`).join('');
  return `<a href="/cases/${esc(c.slug)}" class="related-card">
    <div class="related-card-img">${cover}</div>
    <div class="related-card-body">
      ${c.industry?`<div class="related-card-ind">${esc(c.industry)}</div>`:''}
      <div class="related-card-title">${esc(c.title||'')}</div>
      ${tags?`<div class="related-card-tags">${tags}</div>`:''}
    </div>
  </a>`;
}

function render(c, allCases){
  const isDraft=c.status!=='published';
  const services=c.services||[];
  const metrics=c.metrics||[];

  const draftBanner=isDraft?`<div class="draft-banner">Черновик — не опубликован</div>`:'';

  const resultLinkBtn=c.resultUrl?`<a class="case-result-link" href="${esc(c.resultUrl)}" target="_blank" rel="noopener">
    Посмотреть результат
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>`:'';

  const coverHtml=c.cover&&c.cover.length>4
    ?`<div class="case-cover-inner"><img src="${esc(c.cover)}" alt="${esc(c.title)}"></div>`
    :`<div class="case-cover-inner no-cover"></div>`;

  const metricsBlock=metrics.length?`
    <div class="case-metrics">
      <div class="case-metrics-grid">
        ${metrics.map(m=>`<div class="case-metric-card">
          <div class="case-metric-val">${esc(m.value)}</div>
          <div class="case-metric-lbl">${esc(m.label)}</div>
        </div>`).join('')}
      </div>
    </div>`:'';


  const related=allCases.filter(x=>x.id!==c.id).slice(0,3);
  const relatedBlock=related.length?`
    <div class="case-related">
      <div class="case-related-inner">
        <h2>Другие кейсы</h2>
        <div class="related-grid">${related.map(relatedCardHtml).join('')}</div>
      </div>
    </div>`:'';

  document.title=`${c.title||'Кейс'} — MONTAS`;
  document.getElementById('page-root').innerHTML=`
    ${draftBanner}
    <div class="page-wrap">
      <div class="case-hero">
        <div class="case-breadcrumb">
          <a href="/">Главная</a>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          <a href="/#cases">Кейсы</a>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          <span>${esc(c.title||'')}</span>
        </div>
        ${c.industry?`<div class="case-industry">${esc(c.industry)}</div>`:''}
        <h1 class="case-h1">${esc(c.title||'')}</h1>
        ${c.subtitle?`<p class="case-subtitle">${esc(c.subtitle)}</p>`:''}
        ${resultLinkBtn}
        ${services.length?`<div class="case-services">${services.map(s=>`<span class="case-srv-tag">${esc(s)}</span>`).join('')}</div>`:''}
      </div>
      <div class="case-cover">${coverHtml}</div>
      ${metricsBlock}
      <div class="case-content-wrap">
        <div class="case-content">${c.content||''}</div>
      </div>
    </div>
    ${relatedBlock}
    <section style="background:var(--paper-soft);border-top:1px solid var(--line);padding:clamp(48px,6vw,72px) clamp(20px,4vw,64px);text-align:center">
      <p style="font-family:ui-monospace,monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:14px">Сотрудничество</p>
      <h2 style="font-size:clamp(24px,3.5vw,40px);font-weight:700;letter-spacing:-.025em;margin-bottom:12px">Обсудим ваш проект?</h2>
      <p style="font-size:clamp(14px,1.2vw,16px);color:var(--muted);margin-bottom:28px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6">Расскажите о задаче — ответим в течение рабочего дня</p>
      <a href="/#contact" class="nav-cta" style="display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;padding:13px 28px;border-radius:8px;text-decoration:none">
        Оставить заявку
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </section>
    <footer class="footer-simple">
      <div class="footer-simple-inner">
        <a href="/" class="footer-simple-logo"><img src="/assets/logo.svg" alt="MONTAS" class="footer-logo-img"></a>
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">
          <span class="footer-simple-copy">ООО «Арабелла»</span>
          <a href="/privacy-policy.html" class="footer-simple-copy" style="text-decoration:none">Конфиденциальность</a>
          <span class="footer-simple-copy">© 2026 Montas</span>
        </div>
      </div>
    </footer>`;
}

async function init(){
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  const slug=params.get('slug')||location.pathname.split('/').filter(Boolean).pop();
  const allCases=await getCases();
  const c=id?allCases.find(x=>String(x.id)===String(id)):allCases.find(x=>x.slug===slug);
  if(!c){
    document.getElementById('page-root').innerHTML=`
      <div class="page-wrap">
        <div class="err-wrap">
          <h2>Кейс не найден</h2>
          <p>Возможно, он был удалён или ссылка устарела.</p>
          <a href="/#cases">← Все кейсы</a>
        </div>
      </div>`;
    return;
  }
  render(c, allCases);
}
init();
</script>
<script src="/assets/lead-popup.js"></script>
<script src="/assets/site-layout.js"></script>
</body>
</html>
